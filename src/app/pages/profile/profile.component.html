<div class="min-h-screen bg-gray-50">
  <app-navbar />
  <div class="max-w-4xl mx-auto pt-20 pb-8 px-4">
    <div class="flex items-center gap-8 mb-8">
      <img
        [src]="profileImageUrl() || 'assets/default-profile.png'"
        alt="Profile"
        class="w-32 h-32 rounded-full object-cover border border-gray-200"
      />
      <div class="flex-1">
        <div class="flex items-center gap-4 mb-4">
          <h1 class="text-2xl font-light">{{ username() }}</h1>
          <button class="px-4 py-1 bg-blue-500 text-white rounded font-semibold text-sm hover:bg-blue-600 transition">
            Follow
          </button>
        </div>
        <div class="flex gap-8 mb-4">
          <span><strong>{{ postCount() }}</strong> posts</span>
          <span><strong>{{ followerCount() }}</strong> followers</span>
          <span><strong>{{ followingCount() }}</strong> following</span>
        </div>
        <p class="text-sm">{{ bio() }}</p>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-1 md:gap-4">
      @for (post of posts(); track post.id) {
        <div class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group">
          <img [src]="post.postImage" alt="Post" class="w-full h-full object-cover group-hover:opacity-90 transition" />
        </div>
      }
    </div>
  </div>
</div>
