<div class="min-h-screen bg-gray-50">
  <app-navbar />
  <div class="max-w-2xl mx-auto pt-20 pb-8 px-4">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (input)="onSearch()"
      placeholder="Search users..."
      class="w-full px-4 py-2 border border-gray-300 rounded-lg"
    />

    <!-- User Results -->
    <div class="mt-4 space-y-2">
      @for (user of filteredUsers(); track user.uid) {
        <div [routerLink]="['/profile', user.uid]" class="flex items-center gap-3 p-2 hover:bg-white rounded-lg cursor-pointer">
          <img
            [src]="user.profileImageUrl || 'assets/default-profile.png'"
            alt="Profile"
            class="w-12 h-12 rounded-full object-cover border border-gray-200"
          />
          <div>
            <p class="font-semibold text-sm">{{ user.username }}</p>
            <p class="text-xs text-gray-500 truncate w-48">{{ user.bio }}</p>
          </div>
        </div>
      }
    </div>

    <!-- Post Grid (Explore / Search Results) -->
    <div class="mt-6">
      <h2 class="text-sm font-semibold mb-3 text-gray-500">
        {{ searchQuery ? 'Posts from users matching "' + searchQuery + '"' : 'Explore' }}
      </h2>
      <div class="grid grid-cols-3 gap-1 md:gap-4">
        @for (post of filteredPosts(); track post.id) {
          <div 
            (click)="openPostDetail(post)" 
            class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group relative"
          >
            <img [src]="post.postImage" alt="Post" class="w-full h-full object-cover group-hover:opacity-90 transition" />
          </div>
        }
      </div>
    </div>
  </div>
</div>
